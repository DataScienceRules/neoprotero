<!-- Menu and Language switcher -->
<script>
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("nav-menu");

    const langDropdown = document.querySelector('.lang-dropdown');
    const selectedLang = document.querySelector('.selected-lang img');
    const langOptions = document.querySelectorAll('.lang-options .flag');

    // Toggle hamburger menu
    hamburger.addEventListener("click", (e) => {
        e.stopPropagation();           // prevent click from bubbling
        navMenu.classList.toggle("show");
    });

    // Toggle language dropdown
    langDropdown.addEventListener('click', (e) => {
        e.stopPropagation();
        langDropdown.classList.toggle('open');
    });

    // When selecting a language
    langOptions.forEach(flag => {
        flag.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedLang.src = e.target.src;
            langDropdown.classList.remove('open');
        });
    });

    // CLOSE EVERYTHING ON OUTSIDE CLICK
    document.addEventListener('click', () => {
        navMenu.classList.remove("show");
        langDropdown.classList.remove("open");
    });

</script>

    <script>
        const faders = document.querySelectorAll('.timeline-item, .card, .contact-options');
        const appearOnScroll = new IntersectionObserver(
            (entries, observer) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                });
            },
            {
                rootMargin: '-120px 0px -20% 0px',
                threshold: 0
            }
        );

        faders.forEach(el => appearOnScroll.observe(el));
    </script>

                circle.style.left = e.clientX - rect.left - size / 2 + "px";

                btn.appendChild(circle);
                setTimeout(() => circle.remove(), 600);
            });
        });

<script>
    const scene = document.querySelector('.traits');
    const layers = document.querySelectorAll('.trait-labels');

    scene.addEventListener('mousemove', (e) => {
        const rect = scene.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const moveX = (x - centerX) / centerX;
        const moveY = (y - centerY) / centerY;

        layers.forEach(layer => {
            const depth = layer.dataset.depth;
            const translateX = -moveX * depth * 30;
            const translateY = -moveY * depth * 30;

            layer.style.transform = `
            translate(-50%, -50%)
            translate(${translateX}px, ${translateY}px)`;

            scene.style.transform = `
            rotateX(${moveY * 15}deg)
            rotateY(${moveX * 15}deg)
        `;
        });
    });
</script>

<script>
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.nav a');

    const observer = new IntersectionObserver(
        entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;

                    navLinks.forEach(link => {
                        link.classList.toggle(
                            'active',
                            link.getAttribute('href') === `#${id}`
                        );
                    });
                }
            });
        },
        {
            /*threshold: 0.6  kolik sekce musí být vidět */
            rootMargin: "-100px 0px -40% 0px",
            threshold: 0
        }
    );

    sections.forEach(section => observer.observe(section));
</script>


<script>
    function updateCircleLayout() {
        const container = document.getElementById('circleScene');
        const items = container.querySelectorAll('.circle-item');
        const count = items.length;

        const width = container.offsetWidth;
        const height = container.offsetHeight;

        const centerX = width / 2;
        const centerY = height / 2;

        // radius necháme s paddingem od kraje
        const radius = Math.min(width, height) / 2 - 10;

        items.forEach((item, i) => {
            const angle = (i / count) * (2 * Math.PI) - (Math.PI / 2);

            const x = centerX + radius * Math.cos(angle);
            const y = centerY + radius * Math.sin(angle);

            item.style.left = `${x}px`;
            item.style.top = `${y}px`;
        });
    }

    window.addEventListener('DOMContentLoaded', updateCircleLayout);
    window.addEventListener('resize', updateCircleLayout);

</script>
