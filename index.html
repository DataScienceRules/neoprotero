<!-- Menu and Language switcher -->
<script>
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("nav-menu");

    const langDropdown = document.querySelector('.lang-dropdown');
    const selectedLang = document.querySelector('.selected-lang img');
    const langOptions = document.querySelectorAll('.lang-options .flag');

    // Toggle hamburger menu
    hamburger.addEventListener("click", (e) => {
        e.stopPropagation();           // prevent click from bubbling
        navMenu.classList.toggle("show");
    });

    // Toggle language dropdown
    langDropdown.addEventListener('click', (e) => {
        e.stopPropagation();
        langDropdown.classList.toggle('open');
    });

    // When selecting a language
    langOptions.forEach(flag => {
        flag.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedLang.src = e.target.src;
            langDropdown.classList.remove('open');
        });
    });

    // CLOSE EVERYTHING ON OUTSIDE CLICK
    document.addEventListener('click', () => {
        navMenu.classList.remove("show");
        langDropdown.classList.remove("open");
    });

</script>

                <script>
                    function alignTimelinePoints() {
                        const svg   = document.getElementById("timelineSvg");
                        const path  = document.getElementById("timelinePath");
                        const items = document.querySelectorAll(".timeline-item");

                        if (!svg || !path || !items.length) return;

                        const svgRect = svg.getBoundingClientRect();
                        const vb = svg.viewBox.baseVal; // { x, y, width, height }
                        const totalLength = path.getTotalLength();

                        // remove old points
                        svg.querySelectorAll(".timeline-point").forEach(c => c.remove());

                        items.forEach(item => {
                            // 👉 use the DATE element as the target, not the whole item
                            const dateEl = item.querySelector(".timeline-date");
                            const targetEl = dateEl || item; // fallback to item if no date
                            const rect = targetEl.getBoundingClientRect();
                            const targetScreenY = rect.top + rect.height / 2; // vertical center of the date

                            const steps = 250; // sampling resolution
                            let best = {
                                len: 0,
                                x: 0,
                                y: 0,
                                diff: Infinity
                            };

                            for (let i = 0; i <= steps; i++) {
                                const len = (totalLength * i) / steps;
                                const p = path.getPointAtLength(len); // SVG coords

                                // convert SVG Y -> screen Y
                                const screenY =
                                    svgRect.top + ((p.y - vb.y) / vb.height) * svgRect.height;

                                const diff = Math.abs(screenY - targetScreenY);
                                if (diff < best.diff) {
                                    best = { len, x: p.x, y: p.y, diff };
                                }
                            }

                            // ⭐ bigger, more visible point
                            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                            circle.setAttribute("class", "timeline-point");
                            circle.setAttribute("cx", best.x);
                            circle.setAttribute("cy", best.y);
                            circle.setAttribute("r", "10");          // was 7 → bigger
                            circle.setAttribute("fill", "#ffeba8");
                            circle.setAttribute("stroke", "#0b3636");
                            circle.setAttribute("stroke-width", "4"); // thicker outline

                            svg.appendChild(circle);
                        });
                    }

                    document.addEventListener("DOMContentLoaded", alignTimelinePoints);
                    window.addEventListener("resize", alignTimelinePoints);


                </script>

    <script>

        const elements = document.querySelectorAll(".jump");

        elements.forEach(el => {
            el.addEventListener("mouseenter", () => {
                el.classList.add("animate");

                // remove after animation so it can repeat
                setTimeout(() => {
                    el.classList.remove("animate");
                }, 400);
            });
        });

    </script>
    <script>
        const faders = document.querySelectorAll('.timeline-item');
        const appearOptions = { threshold: 0.2 };

        const appearOnScroll = new IntersectionObserver(function(entries, observer) {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            });
        }, appearOptions);

        faders.forEach(fader => appearOnScroll.observe(fader));
    </script>

    <script>
        document.querySelectorAll('.scroll').forEach(link => {
            link.addEventListener('click', function(e) {

                document.querySelector(this.getAttribute('href'))
                    .scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>

    <script>
        document.querySelectorAll(".ripple").forEach(btn => {
            btn.addEventListener("mouseenter", function(e) {
                const circle = document.createElement("span");
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                circle.style.width = circle.style.height = size + "px";
                circle.style.left = e.clientX - rect.left - size / 2 + "px";
                circle.style.top = e.clientY - rect.top - size / 2 + "px";
                btn.appendChild(circle);
                setTimeout(() => circle.remove(), 600);
            });
        });
    </script>
