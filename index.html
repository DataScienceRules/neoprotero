    <title>Neoprotero</title>
    <style>
        button {
            position: relative;
            overflow: hidden;
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        .ripple span {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
        }
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>

<!-- Navigation -->
<header class="header">

    <nav id="nav-menu" class="nav">
        <a href="#profile" onclick="closeMenu()" class="scroll" data-translate="menu_profile"></a>
        <a href="#journey" onclick="closeMenu()" class="scroll" data-translate="menu_journey"></a>
        <a href="#etymology" onclick="closeMenu()" class="scroll" data-translate="menu_etymology"></a>
        <a href="#contact" onclick="closeMenu()" class="scroll" data-translate="menu_contact"></a>
        <div class="lang-dropdown">
            <div class="selected-lang">
                <img src="flags/icons8-czech-republic-50.png" class="flag" data-lang="cs" alt="Czech">
            </div>

            <div class="lang-options">
                <img src="flags/icons8-czech-republic-50.png" class="flag" data-lang="cs" alt="Czech" onclick="setLanguage('cs')">
                <img src="flags/icons8-great-britain-50.png" class="flag" data-lang="en" alt="English" onclick="setLanguage('en')">
                <img src="flags/icons8-germany-50.png" class="flag" data-lang="de" alt="German" onclick="setLanguage('de')">

            </div>
        </div>
    </nav>

    <div class="hamburger" id="hamburger">
        ☰
    </div>
</header>

<!-- Menu and Language switcher -->
<script>
    const hamburger = document.getElementById("hamburger");
    const navMenu = document.getElementById("nav-menu");

    const langDropdown = document.querySelector('.lang-dropdown');
    const selectedLang = document.querySelector('.selected-lang img');
    const langOptions = document.querySelectorAll('.lang-options .flag');

    // Toggle hamburger menu
    hamburger.addEventListener("click", (e) => {
        e.stopPropagation();           // prevent click from bubbling
        navMenu.classList.toggle("show");
    });

    // Toggle language dropdown
    langDropdown.addEventListener('click', (e) => {
        e.stopPropagation();
        langDropdown.classList.toggle('open');
    });

    // When selecting a language
    langOptions.forEach(flag => {
        flag.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedLang.src = e.target.src;
            langDropdown.classList.remove('open');
        });
    });

    // CLOSE EVERYTHING ON OUTSIDE CLICK
    document.addEventListener('click', () => {
        navMenu.classList.remove("show");
        langDropdown.classList.remove("open");
    });

</script>

<body>

    <script>
        const faders = document.querySelectorAll('.fade-in');
        const appearOptions = { threshold: 0.2 };

        const appearOnScroll = new IntersectionObserver(function(entries, observer) {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('visible');
                observer.unobserve(entry.target);
            });
        }, appearOptions);

        faders.forEach(fader => appearOnScroll.observe(fader));
    </script>

    <script>
        document.querySelectorAll('.scroll').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href'))
                    .scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>

    <script>
        document.querySelectorAll(".ripple").forEach(btn => {
            btn.addEventListener("mouseenter", function(e) {
                const circle = document.createElement("span");
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                circle.style.width = circle.style.height = size + "px";
                circle.style.left = e.clientX - rect.left - size / 2 + "px";
                circle.style.top = e.clientY - rect.top - size / 2 + "px";
                btn.appendChild(circle);
                setTimeout(() => circle.remove(), 600);
            });
        });
    </script>
